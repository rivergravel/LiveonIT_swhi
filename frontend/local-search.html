<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>20-Minute Map | Local Search</title>

  <!-- Tailwind CSS v4 -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Public+Sans:wght@400;600;700;900&display=swap"
    rel="stylesheet">

  <!-- MapLibre & Turf -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf/turf.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary: #004071;
      --color-secondary: #536070;
      --color-accent: #2E7D32;
      --color-neutral: #F8F9FA;
      --font-heading: 'Public Sans', sans-serif;
      --font-body: 'Public Sans', sans-serif;
      --font-label: 'Inter', sans-serif;
    }
  </style>
  <style>
    body {
      background-color: #F8F9FA;
      color: #1A1A2E;
      font-family: 'Public Sans', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Public Sans', sans-serif;
    }

    .font-label {
      font-family: 'Inter', sans-serif;
    }

    .map-height {
      height: 600px;
    }

    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 6px;
    }

    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SERVICE_CONFIG = {
      'Supermarket': { color: '#E67E22', icon: 'shopping-cart' },
      'GP Service': { color: '#E74C3C', icon: 'stethoscope' },
      'Pharmacy': { color: '#9B59B6', icon: 'pill' },
      'Post Office': { color: '#F1C40F', icon: 'mail' },
      'Transport': { color: '#3498DB', icon: 'bus' }
    };

    const App = () => {
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [services, setServices] = useState([]);
      const [toggles, setToggles] = useState({
        'Supermarket': true, 'GP Service': true, 'Pharmacy': true, 'Post Office': true, 'Transport': true
      });

      const mapRef = useRef(null);
      const markerRef = useRef(null);
      const serviceMarkers = useRef([]);
      const activeAnimations = useRef([]);
      const searchRef = useRef(null);
      const apiBase = 'http://localhost:3000';

      // Click outside listener for search container
      useEffect(() => {
        const handleClickOutside = (event) => {
          if (searchRef.current && !searchRef.current.contains(event.target)) {
            setResults([]);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      // Initialize Map
      useEffect(() => {
        mapRef.current = new maplibregl.Map({
          container: 'map',
          style: 'https://tiles.openfreemap.org/styles/bright',
          center: [144.9631, -37.8136],
          zoom: 12
        });

        mapRef.current.on('load', () => {
          lucide.createIcons();
          mapRef.current.resize();
        });

        return () => mapRef.current.remove();
      }, []);

      // Re-run lucide icons whenever UI state changes
      useEffect(() => {
        if (typeof lucide !== 'undefined') lucide.createIcons();
      });

      // Search Handler
      useEffect(() => {
        const timer = setTimeout(async () => {
          if (query.length < 3) { setResults([]); return; }
          try {
            const res = await fetch(`${apiBase}/api/local-search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            if (Array.isArray(data)) setResults(data);
          } catch (e) { console.error(e); }
        }, 300);
        return () => clearTimeout(timer);
      }, [query]);

      const clearMap = () => {
        // Stop current animations
        activeAnimations.current.forEach(cancelAnimationFrame);
        activeAnimations.current = [];

        // Remove Service Markers
        serviceMarkers.current.forEach(m => m.marker.remove());
        serviceMarkers.current = [];

        // Remove Layers and Sources
        const style = mapRef.current.getStyle();
        if (style && style.layers) {
          style.layers.forEach(layer => {
            if (layer.id.startsWith('path-') || layer.id === 'radius-circle-fill') {
              mapRef.current.removeLayer(layer.id);
            }
          });
        }
        if (style && style.sources) {
          Object.keys(style.sources).forEach(sourceId => {
            if (sourceId.endsWith('-source') || sourceId === 'radius-circle') {
              mapRef.current.removeSource(sourceId);
            }
          });
        }
      };

      const handleSelect = async (item) => {
        const lat = parseFloat(item.lat), lon = parseFloat(item.lon);
        setQuery(item.display_name);
        setResults([]);

        mapRef.current.flyTo({ center: [lon, lat], zoom: 14.5 });

        // Add Main Marker
        if (markerRef.current) markerRef.current.remove();
        markerRef.current = new maplibregl.Marker({ color: '#c0392b' }).setLngLat([lon, lat]).addTo(mapRef.current);

        clearMap();

        // Add 800m Circle
        mapRef.current.addSource('radius-circle', { type: 'geojson', data: turf.circle([lon, lat], 800, { units: 'meters' }) });
        mapRef.current.addLayer({ id: 'radius-circle-fill', type: 'fill', source: 'radius-circle', paint: { 'fill-color': '#004071', 'fill-opacity': 0.08 } });

        try {
          const res = await fetch(`${apiBase}/api/nearby-services?lat=${lat}&lon=${lon}`);
          const data = await res.json();
          setServices(data);

          data.forEach((s, i) => {
            const id = `path-${i}`;

            // Marker
            const m = new maplibregl.Marker({ color: s.color, scale: 0.7 })
              .setLngLat([s.lon, s.lat])
              .setPopup(new maplibregl.Popup().setHTML(`<strong>${s.category}</strong><br>${s.name || ''}`))
              .addTo(mapRef.current);

            if (!toggles[s.category]) m.getElement().style.display = 'none';
            serviceMarkers.current.push({ category: s.category, marker: m });

            // Route
            fetch(`${apiBase}/api/route?sLat=${lat}&sLon=${lon}&eLat=${s.lat}&eLon=${s.lon}`)
              .then(r => r.json())
              .then(route => animateRoute(route.coordinates, s.color, id, s.category));
          });
        } catch (err) { console.error(err); }
      };

      const animateRoute = (coordinates, color, id, category) => {
        const sourceId = `${id}-source`;
        const geojson = { type: 'Feature', geometry: { type: 'LineString', coordinates: [coordinates[0]] } };

        if (!mapRef.current.getSource(sourceId)) {
          mapRef.current.addSource(sourceId, { type: 'geojson', data: geojson });
          mapRef.current.addLayer({
            id: id, type: 'line', source: sourceId,
            layout: { 'line-cap': 'round', 'line-join': 'round', 'visibility': toggles[category] ? 'visible' : 'none' },
            paint: { 'line-color': color, 'line-width': 4, 'line-opacity': 0.7 }
          });
        }

        let progress = 0;
        const duration = 2000;
        const startTime = performance.now();

        function frame(now) {
          const elapsed = now - startTime;
          progress = Math.min(elapsed / duration, 1);
          const pathLen = coordinates.length - 1;
          const exactIdx = progress * pathLen;
          const segmentIdx = Math.floor(exactIdx);
          const segmentProgress = exactIdx - segmentIdx;

          const curCoords = [];
          for (let j = 0; j <= segmentIdx; j++) curCoords.push(coordinates[j]);
          if (segmentIdx < pathLen) {
            const start = coordinates[segmentIdx], end = coordinates[segmentIdx + 1];
            curCoords.push([start[0] + (end[0] - start[0]) * segmentProgress, start[1] + (end[1] - start[1]) * segmentProgress]);
          }

          if (mapRef.current && mapRef.current.getSource(sourceId)) {
            mapRef.current.getSource(sourceId).setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: curCoords } });
            if (progress < 1) {
              const animId = requestAnimationFrame(frame);
              activeAnimations.current.push(animId);
            }
          }
        }
        const initialAnimId = requestAnimationFrame(frame);
        activeAnimations.current.push(initialAnimId);
      };

      const toggleService = (category) => {
        const newState = !toggles[category];
        setToggles(prev => ({ ...prev, [category]: newState }));

        serviceMarkers.current.forEach(item => {
          if (item.category === category) item.marker.getElement().style.display = newState ? 'block' : 'none';
        });

        services.forEach((s, i) => {
          if (s.category === category && mapRef.current.getLayer(`path-${i}`)) {
            mapRef.current.setLayoutProperty(`path-${i}`, 'visibility', newState ? 'visible' : 'none');
          }
        });
      };

      return (
        <div className="flex flex-col min-h-screen">
          {/* Header - DARK BACKGROUND for visibility */}
          <header className="bg-primary px-8 py-4 flex items-center justify-between shadow-sm z-20">
            <div className="flex items-center gap-3">
              <div className="bg-white/10 p-2 rounded-md">
                <i data-lucide="map-pin" className="text-white w-5 h-5"></i>
              </div>
              <h1 className="text-white text-xl font-bold tracking-tight">20-Minute Map</h1>
            </div>
            <div className="hidden md:block text-white/80 text-xs font-semibold tracking-widest font-label uppercase">
            </div>
          </header>

          <main className="flex-1 max-w-7xl w-full mx-auto p-6 flex flex-col gap-6">

            {/* Search Bar - CENTERED TOP */}
            <div className="w-full max-w-2xl mx-auto self-center relative z-30 flex flex-col items-center justify-center p-6 bg-white rounded-md shadow-sm border border-gray-200">
              <div className="text-center mb-4">
                <h2 className="text-xl font-bold text-primary mb-1">Find Local Services</h2>
                <p className="text-sm text-secondary font-label">Search for any Melbourne address to discover what's within a 20-minute walk.</p>
              </div>
              <div className="w-full relative" ref={searchRef}>
                <div className="bg-white p-2 rounded-md border border-gray-300 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary flex items-center shadow-sm transition-all text-base">
                  <div className="px-3 text-secondary">
                    <i data-lucide="search" className="w-5 h-5"></i>
                  </div>
                  <input
                    type="text"
                    value={query}
                    onChange={(e) => {
                      setQuery(e.target.value);
                      if (e.target.value.length < 3) setResults([]);
                    }}
                    placeholder="Example: Melbourne Central..."
                    className="flex-1 py-1.5 bg-transparent outline-none text-gray-900 font-label placeholder:text-gray-400"
                  />
                  {query && (
                    <button onClick={() => { setQuery(''); setResults([]); }} className="px-3 text-gray-400 hover:text-gray-600 transition-colors">
                      <i data-lucide="x" className="w-4 h-4"></i>
                    </button>
                  )}
                </div>
                {results.length > 0 && (
                  <ul className="absolute left-0 right-0 mt-2 bg-white border border-gray-200 rounded-md shadow-lg z-50 max-h-80 overflow-y-auto custom-scroll p-1 font-label">
                    {results.map((r, i) => (
                      <li
                        key={i}
                        onClick={() => handleSelect(r)}
                        className="px-4 py-2.5 hover:bg-gray-50 rounded md:rounded-sm cursor-pointer text-sm font-medium text-gray-800 border-b border-gray-50 last:border-0 transition-colors"
                      >
                        {r.display_name}
                      </li>
                    ))}
                  </ul>
                )}
              </div>
            </div>

            <div className="flex flex-col lg:flex-row gap-6">

              {/* Sidebar Toggles */}
              <aside className="w-full lg:w-80 flex flex-col">
                <div className="bg-white p-5 rounded-md border border-gray-200 shadow-sm">
                  <div className="flex items-center gap-2 mb-5">
                    <i data-lucide="sliders-horizontal" className="w-4 h-4 text-primary"></i>
                    <h2 className="text-sm font-bold text-gray-800 uppercase tracking-widest font-label">Filter Services</h2>
                  </div>

                  <div className="space-y-3">
                    {Object.keys(SERVICE_CONFIG).map(cat => {
                      const sInfo = services.find(s => s.category === cat);
                      return (
                        <div
                          key={cat}
                          onClick={() => toggleService(cat)}
                          className={`flex items-center justify-between p-3 rounded-md cursor-pointer transition-all border ${toggles[cat] ? 'bg-white border-primary/20 shadow-sm' : 'bg-gray-50 border-gray-100 opacity-60'}`}
                        >
                          <div className="flex items-center gap-3 min-w-0 pr-2">
                            <div className="w-8 h-8 rounded shrink-0 flex items-center justify-center border" style={{ backgroundColor: `${SERVICE_CONFIG[cat].color}15`, borderColor: `${SERVICE_CONFIG[cat].color}30` }}>
                              <i data-lucide={SERVICE_CONFIG[cat].icon} className="w-4 h-4" style={{ color: SERVICE_CONFIG[cat].color }}></i>
                            </div>
                            <div className="min-w-0">
                              <div className="text-sm font-semibold text-gray-900 leading-tight truncate">{cat}</div>
                              {sInfo && (
                                <div className="text-xs text-secondary font-medium font-label mt-0.5 truncate">
                                  {Math.round(sInfo.dist_meters)}m • {sInfo.name || 'Found'}
                                </div>
                              )}
                            </div>
                          </div>
                          <div className={`w-8 h-4 rounded-full relative transition-colors shrink-0 ${toggles[cat] ? 'bg-accent' : 'bg-gray-300'}`}>
                            <div className={`absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all ${toggles[cat] ? 'left-4.5' : 'left-0.5'}`}></div>
                          </div>
                        </div>
                      )
                    })}
                  </div>
                </div>
              </aside>

              {/* Map Section */}
              <section className="flex-1 bg-gray-100 rounded-md border border-gray-300 shadow-sm overflow-hidden relative map-height min-h-[500px]">
                <div id="map" className="absolute inset-0 w-full h-full"></div>
              </section>

            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
