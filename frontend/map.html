<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20-Minute Map – Search your address</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tiles.openfreemap.org">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script defer src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf/turf.min.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <script src="script.js" defer></script>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="index.html" class="nav-logo">20-Minute Map</a>
    <a href="index.html" class="nav-back">← About this project</a>
  </nav>

  <!-- Main -->
  <main>
    <!-- Search -->
    <div class="search-section">
      <h1 class="page-title">Check your neighbourhood</h1>
      <p class="page-subtitle">Type a Melbourne address to see what's within walking distance.</p>
      <div class="search-card">
        <div class="search-row">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="query" type="text" placeholder="e.g. 42 Fitzroy St, St Kilda" autocomplete="off" />
        </div>
      </div>
      <ul id="results"></ul>
    </div>

    <!-- Map -->
    <div class="map-wrapper">
      <div id="progress-bar"></div>
      <div id="map"></div>
      <button id="fullscreen-btn" title="Toggle fullscreen" onclick="toggleFullscreen()">
        <svg id="fs-expand-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"></polyline>
          <polyline points="9 21 3 21 3 15"></polyline>
          <line x1="21" y1="3" x2="14" y2="10"></line>
          <line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
        <svg id="fs-collapse-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polyline points="4 14 10 14 10 20"></polyline>
          <polyline points="20 10 14 10 14 4"></polyline>
          <line x1="10" y1="14" x2="3" y2="21"></line>
          <line x1="21" y1="3" x2="14" y2="10"></line>
        </svg>
      </button>
    </div>

    <!-- Legend -->
    <div class="legend">
      <p class="legend-title">Services shown</p>
      <div class="legend-items">
        <span>🛒 Supermarket</span>
        <span>💊 Pharmacy</span>
        <span>🏥 Health Clinic</span>
        <span>🚌 Bus Stop</span>
        <span>🚆 Train Station</span>
        <span>📮 Post Office</span>
      </div>
    </div>
  </main>

</body>
</html>
