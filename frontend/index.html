<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20-Minute Map – Address Search</title>

  <!-- Preconnect to external domains to speed up DNS/TLS handshakes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tiles.openfreemap.org">

  <!-- Fonts: Public Sans (headlines + body) & Inter (labels) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- MapLibre GL JS via CDN -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script defer src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf/turf.min.js"></script>

  <link rel="stylesheet" href="styles.css"/>
  <script src="script.js" defer></script>
</head>

<body>

  <!-- Header -->
  <header>
    <span class="logo">20-Minute Map</span>
  </header>

  <!-- Main -->
  <main>
    <h1 class="page-title">20-Minute Neighbourhood Map</h1>
    <!-- Search -->
    <div class="search-card">
      <p class="search-label">Address Search</p>
      <div class="search-row">
        <input id="query" type="text" placeholder="Start typing a Melbourne address…" autocomplete="off" />
      </div>
    </div>

    <ul id="results"></ul>

    <!-- Map -->
    <div class="map-wrapper">
      <!-- Progress bar: animates left-to-right along the top of the map while services load -->
      <div id="progress-bar"></div>
      <div id="map"></div>
      <!-- Fullscreen toggle button — sits in the top-right corner of the map -->
      <button id="fullscreen-btn" title="Toggle fullscreen" onclick="toggleFullscreen()">
        <svg id="fs-expand-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"></polyline>
          <polyline points="9 21 3 21 3 15"></polyline>
          <line x1="21" y1="3" x2="14" y2="10"></line>
          <line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
        <svg id="fs-collapse-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polyline points="4 14 10 14 10 20"></polyline>
          <polyline points="20 10 14 10 14 4"></polyline>
          <line x1="10" y1="14" x2="3" y2="21"></line>
          <line x1="21" y1="3" x2="14" y2="10"></line>
        </svg>
      </button>
    </div>

    <!-- Legend -->
    <div class="legend">
      <p class="legend-title">Services shown</p>
      <div class="legend-items">
        <span>🛒 Supermarket</span>
        <span>💊 Pharmacy</span>
        <span>🏥 Health Clinic</span>
        <span>🚌 Bus Stop</span>
        <span>🚆 Train Station</span>
        <span>📮 Post Office</span>
      </div>
    </div>
  </main>

</body>

</html>
