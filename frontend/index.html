<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20-Minute Map – Address Search</title>

  <!-- Preconnect to external domains to speed up DNS/TLS handshakes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tiles.openfreemap.org">

  <!-- Fonts: Public Sans (headlines + body) & Inter (labels) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- MapLibre GL JS via CDN -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script defer src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf/turf.min.js"></script>

  <style>
    /* ── Reset ─────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Design tokens (from DESIGN.md) ────────────── */
    :root {
      --primary: #004071;
      --secondary: #536070;
      --tertiary: #2E7D32;
      --neutral: #F8F9FA;
      --border: #D0D5DD;
      --text: #1A1A2E;
      --text-muted: #536070;
      --radius: 6px;
      --shadow: 0 1px 4px rgba(0, 0, 0, 0.10);
    }

    /* ── Base ───────────────────────────────────────── */
    body {
      font-family: 'Public Sans', sans-serif;
      background: var(--neutral);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header bar ─────────────────────────────────── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header .badge {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      background: var(--tertiary);
      color: #fff;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    /* ── Main content ───────────────────────────────── */
    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px;
    }

    /* Page heading */
    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    /* ── Search card ────────────────────────────────── */
    .search-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 6px;
    }

    .search-label {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    .search-row input {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      color: var(--text);
      transition: border-color 0.15s;
    }

    .search-row input:focus {
      border-color: var(--primary);
    }

    .search-row button {
      display: none;
      /* kept in DOM for fallback, hidden visually */
    }

    /* ── Dropdown results ───────────────────────────── */
    #results {
      display: none;
      background: #fff;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      list-style: none;
      margin-bottom: 20px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
    }

    #results li {
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      padding: 11px 16px;
      cursor: pointer;
      border-bottom: 1px solid #F0F2F5;
      color: var(--text);
    }

    #results li:last-child {
      border-bottom: none;
    }

    #results li:hover,
    #results li.selected {
      background: #EEF3F8;
      color: var(--primary);
    }

    /* ── Map box ────────────────────────────────────── */
    .map-wrapper {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      height: 500px;
      box-shadow: var(--shadow);
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <span class="logo">20-Minute Map</span>
  </header>

  <!-- Main -->
  <main>
    <h1 class="page-title">20-Minute Neighbourhood Map</h1>
    <!-- Search -->
    <div class="search-card">
      <p class="search-label">Address Search</p>
      <div class="search-row">
        <input id="query" type="text" placeholder="Start typing a Melbourne address…" autocomplete="off" />
      </div>
    </div>

    <ul id="results"></ul>

    <!-- Map -->
    <div class="map-wrapper">
      <div id="map"></div>
    </div>

  </main>

  <script>
    let map = null;
    let marker = null;
    let debounceTimer = null;
    let currentResults = [];
    let selectedIndex = -1;

    // Initialize map and listeners after deferred script loads
    document.addEventListener('DOMContentLoaded', () => {
      map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/bright',
        center: [144.9631, -37.8136],
        zoom: 12
      });

      // Predictive search — fires 250ms after user stops typing
      document.getElementById('query').addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const q = document.getElementById('query').value.trim();
        if (q.length < 3) {
          // Hide results if query is too short
          document.getElementById('results').style.display = 'none';
          return;
        }
        debounceTimer = setTimeout(() => search(q), 250);
      });

      // Keyboard navigation (Up/Down/Enter/Escape)
      document.getElementById('query').addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          document.getElementById('results').style.display = 'none';
        } else if (e.key === 'ArrowDown') {
          e.preventDefault(); // Prevent cursor from moving in input
          if (selectedIndex < currentResults.length - 1) {
            selectedIndex++;
            updateSelectionUI();
          }
        } else if (e.key === 'ArrowUp') {
          e.preventDefault(); // Prevent cursor from moving in input
          if (selectedIndex > 0) {
            selectedIndex--;
            updateSelectionUI();
          }
        } else if (e.key === 'Enter') {
          e.preventDefault(); // Prevent form submit if there was one
          if (selectedIndex >= 0 && selectedIndex < currentResults.length) {
            select(currentResults[selectedIndex]);
          }
        }
      });
    });

    function updateSelectionUI() {
      const listItems = document.querySelectorAll('#results li');
      listItems.forEach((li, i) => {
        if (i === selectedIndex) {
          li.classList.add('selected');
        } else {
          li.classList.remove('selected');
        }
      });
    }

    async function search(q) {
      const list = document.getElementById('results');
      list.style.display = 'block';
      list.innerHTML = '<li><span style="color:var(--text-muted)">Searching...</span></li>';

      try {
        // Chris's original line
        // const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        // local testing which points to aws api gateway endpoint
        const res = await fetch(`https://qchhoyc9a9.execute-api.ap-southeast-2.amazonaws.com/prod/api/search?q=${encodeURIComponent(q)}`);
        // local testing which points a modified lamda function (and different endpoint)
        // const res = await fetch(`https://9yus777fvh.execute-api.ap-southeast-2.amazonaws.com/prod/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        currentResults = data;
        selectedIndex = -1; // Reset selection
        list.innerHTML = '';

        if (!data || !data.length) {
          list.innerHTML = '<li><span style="color:var(--text-muted)">No results found.</span></li>';
          return;
        }

        data.forEach((item, index) => {
          const li = document.createElement('li');
          li.textContent = item.display_name;
          li.onclick = () => select(item);
          li.onmouseenter = () => {
            selectedIndex = index;
            updateSelectionUI();
          };
          list.appendChild(li);
        });
      } catch (e) {
        list.style.display = 'block';
        list.innerHTML = '<li><span style="color:#c0392b">Search failed.</span></li>';
      }
    }

    function select(item) {
      const lat = parseFloat(item.lat);
      const lon = parseFloat(item.lon);

      document.getElementById('query').value = item.display_name;
      document.getElementById('results').style.display = 'none';

      map.flyTo({ center: [lon, lat], zoom: 15 });
      // set map field of view to the selected location +/- 0.0072 degrees (roughly 800m) to give some context around the point
      map.fitBounds([[lon - 0.0072, lat - 0.0072], [lon + 0.0072, lat + 0.0072]], { padding: 20 });
      // Draw circle with 800m radius around the selected point to represent the 20-minute walking distance

      if (marker) marker.remove();

      marker = new maplibregl.Marker({ color: '#c0392b' })
        .setLngLat([lon, lat])
        .addTo(map);
      
      // Use Turf.js to create a GeoJSON circle with an 800m radius around the selected point
      const circle = turf.circle([lon, lat], 800, { steps: 64, units: 'meters' });

      map.addSource('radius-circle', {
        type: 'geojson',
        data: circle
      });

      map.addLayer({
        id: 'radius-circle-fill',
        type: 'fill',
        source: 'radius-circle',
        paint: {
          'fill-color': '#4A90E2',
          'fill-opacity': 0.15
        }
      });


    }
  </script>

</body>

</html>
